# 齐谐科技 — docker-compose.yml
# docker compose up -d 一键启动全栈

services:
  # ---------- 反向代理 ----------
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: qixie-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/ssl/certbot/www:/var/www/certbot:ro
      - ./infra/ssl/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      qixie-site:
        condition: service_started
    networks:
      - qixie-net

  # ---------- 官网静态站点 ----------
  qixie-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qixie-site
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - qixie-net

  # ---------- SSL 证书自动续期 (Let's Encrypt) ----------
  certbot:
    image: certbot/certbot:latest
    container_name: qixie-certbot
    restart: unless-stopped
    volumes:
      - ./infra/ssl/certbot/conf:/etc/letsencrypt
      - ./infra/ssl/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - ssl
    networks:
      - qixie-net

volumes:

networks:
  qixie-net:
    name: qixie-network
    driver: bridge
