# 齐谐科技 — docker-compose.yml
# docker compose up -d 一键启动全栈

services:
  # ---------- 反向代理 ----------
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: qixie-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/ssl/certbot/www:/var/www/certbot:ro
      - ./infra/ssl/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      qixie-site:
        condition: service_started
    networks:
      - qixie-net

  # ---------- 官网静态站点 ----------
  qixie-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qixie-site
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - qixie-net

  # ---------- SSL 证书自动续期 (Let's Encrypt) ----------
  certbot:
    image: certbot/certbot:latest
    container_name: qixie-certbot
    restart: unless-stopped
    volumes:
      - ./infra/ssl/certbot/conf:/etc/letsencrypt
      - ./infra/ssl/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - ssl
    networks:
      - qixie-net

  # ========== 监控告警 (Sprint 4, 可选启动) ==========

  # Docker 容器指标采集
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: qixie-cadvisor
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks:
      - qixie-net

  # 主机指标采集
  node-exporter:
    image: prom/node-exporter:latest
    container_name: qixie-node-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    networks:
      - qixie-net

  # ========== 待 CMP-129 集成: 全栈服务占位 ==========

