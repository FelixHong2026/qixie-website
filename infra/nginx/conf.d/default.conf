# 齐谐科技 — Nginx 反向代理配置
# 生产环境: felix2026.cc.cd
# 管理面板 (章鱼哥): openclaw.qixie.tech

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name felix2026.cc.cd openclaw.qixie.tech;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 齐谐科技官网
server {
    listen 443 ssl http2;
    server_name felix2026.cc.cd;

    ssl_certificate /etc/letsencrypt/live/felix2026.cc.cd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/felix2026.cc.cd/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/felix2026.cc.cd/chain.pem;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://qixie-site:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        proxy_pass http://qixie-site:80;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }
}

# OpenClaw Gateway 管理面板 (章鱼哥)
server {
    listen 443 ssl http2;
    server_name openclaw.qixie.tech;

    ssl_certificate /etc/letsencrypt/live/openclaw.qixie.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw.qixie.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/openclaw.qixie.tech/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://192.168.1.223:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 支持 (Portainer 需要)
    location /api/websocket/ {
        proxy_pass http://192.168.1.223:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
